<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Royal Spring Hotel</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Royal Spring Hotel",
        "url": "https://royal-spring-hotel.onrender.com",
        "logo": "https://royal-spring-hotel.onrender.com/logo.png"
      }
    </script>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Royal Spring Hotel – Luxury Resort with premium rooms, bookings, and services." />
    <meta name="keywords" content="Royal Spring Hotel, luxury resort, rooms, bookings, ERP system" />

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Royal Spring Hotel" />
    <meta property="og:description" content="Luxury Resort with premium rooms, bookings, and services." />
    <meta property="og:image" content="https://royal-spring-hotel.onrender.com/logo.png" />
    <meta property="og:url" content="https://royal-spring-hotel.onrender.com" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Tailwind / global styles are imported via React, no <link> needed here -->
  </head>

  <body class="bg-slate-50 font-sans">
    <!-- React app root -->
    <div id="root"></div>

    <!-- Vite injects the compiled JS automatically; no manual script needed -->
  </body>
</html>
